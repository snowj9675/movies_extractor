name: Scrape Movie Details

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:
    inputs:
      reset_checkpoint:
        description: "Delete checkpoint and re-scrape all (true/false)"
        required: false
        default: "false"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml psycopg2-binary

      - name: Reset checkpoint (if requested)
        if: github.event.inputs.reset_checkpoint == 'true'
        run: |
          rm -f checkpoint_details.txt
          rm -rf csv_chunks/

      - name: Run detail scraper
        env:
          PYTHONUNBUFFERED: "1"
          GH_PAT: ${{ secrets.PAT_TOKEN }}
        run: python scraper_v7.py

      - name: Upload to Neon
        if: always()
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -f csv_chunks/movies_all.csv ]; then
            python upload_to_neon.py
          else
            echo "[INFO] No merged CSV found — skipping Neon upload"
          fi

      - name: Commit checkpoint and CSVs
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          [ -f checkpoint_details.txt ] && git add checkpoint_details.txt
          [ -d csv_chunks ]             && git add csv_chunks/

          if git diff --cached --quiet; then
            echo "[INFO] No changes to commit"
          else
            DONE=$(wc -l < checkpoint_details.txt 2>/dev/null | tr -d ' ' || echo 0)
            git commit -m "scrape: ${DONE} movies detailed [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "[WARN] Push attempt $i failed, retrying..."
              sleep 5
            done
            echo "[INFO] Pushed. Checkpoint: ${DONE}"
          fi
