name: Scrape Movie Details

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:
    inputs:
      reset_checkpoint:
        description: "Delete checkpoint and re-scrape all (true/false)"
        required: false
        default: "false"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Reset checkpoint (if requested)
        if: github.event.inputs.reset_checkpoint == 'true'
        run: rm -f checkpoint_details.json movies_detailed.json

      - name: Run detail scraper
        env:
          PYTHONUNBUFFERED: "1"
          GH_PAT: ${{ secrets.PAT_TOKEN }}
        run: python scraper_details.py

      - name: Commit progress
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage files only if they exist
          [ -f movies_detailed.json ]   && git add movies_detailed.json
          [ -f checkpoint_details.json ] && git add checkpoint_details.json

          if git diff --cached --quiet; then
            echo "[INFO] No changes to commit"
          else
            DONE=$(python3 -c "
import json, pathlib
p = pathlib.Path('checkpoint_details.json')
data = json.loads(p.read_text()) if p.exists() else []
print(len(data))
")
            git commit -m "scrape: ${DONE} movies detailed [skip ci]"

            # Retry push up to 3 times in case of race with another run
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "[WARN] Push attempt $i failed, retrying..."
              sleep 5
            done

            echo "[INFO] Pushed. Checkpoint: ${DONE}"
          fi
